<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BO-TRON3000</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
   
    
    <style>
        :root {
            /* Mantenho as cores originais do cartão para contraste */
            --cor-cartao: #ffffff;
            --cor-texto-titulo: #880e4f;
            --cor-texto-corpo: #424242;
            --cor-detalhe: #d81b60;
            --cor-viewer-fundo: #fce4ec;
        }

        body {
            font-family: 'Lora', serif;
            margin: 0;
            padding: 0; /* Tiro o padding do body para a sobreposição funcionar */
            min-height: 100vh;
            color: var(--cor-texto-corpo);
            position: relative; /* Necessário para a sobreposição */
            
            /* --- CONFIGURAÇÃO DO FUNDO DE MANGÁ --- */
            /* 1. Link para sua imagem de mosaico */
            background-image: url('wha1.jpeg'); 
            /* 2. Faz a imagem se repetir (criar o mosaico) */
            background-repeat: repeat; 
            /* 3. Mantém o fundo fixo ao rolar a página (opcional, dá um efeito legal) */
            background-attachment: fixed;
            /* 4. Define um tamanho padrão para o mosaico não ficar gigante */
            background-size: 350px; 
        }

        /* Camada de sobreposição para escurecer o fundo e dar leitura */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7); /* Preto com 70% de transparência */
            z-index: 1; /* Fica atrás do conteúdo, mas à frente do fundo */
        }

        .cartao-container {
            position: relative; /* Fica à frente da sobreposição */
            z-index: 2;
            background-color: var(--cor-cartao);
            max-width: 600px;
            width: 90%; /* Ajuste para mobile */
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); /* Sombra mais forte */
            overflow: hidden;
            padding: 50px 30px;
            box-sizing: border-box;
            text-align: center;
            
            /* Centralização do cartão na tela */
            margin: 40px auto; 
            display: block;
        }
	
	.player-musica {
            margin: 20px auto 30px auto;
            width: 100%;
            max-width: 300px;
            text-align: center;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--cor-texto-titulo);
            font-size: 2.8rem;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 600;
        }

        header p.subtitulo {
            font-style: italic;
            color: var(--cor-detalhe);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        /* Estilo do Visualizador 3D */
        model-viewer {
            width: 100%;
            height: 300px;
            background-color: var(--cor-viewer-fundo);
            border-radius: 12px;
            margin: 0 auto 30px auto;
            display: block;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .mensagem {
            text-align: left;
            line-height: 1.8;
            font-size: 1.15rem;
        }

        .mensagem p {
            margin-bottom: 20px;
        }

        .assinatura {
            margin-top: 40px;
            text-align: right;
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--cor-texto-titulo);
            font-style: italic;
        }
        
        .foto-destaque {
            width: 100%;
            max-width: 400px; /* DIMINUÍDO: antes era 400px, agora é 250px */
            height: auto;
            border-radius: 12px;
            /* O 'margin: 0 auto' garante que a foto fique centralizada */
            margin: 0 auto 30px auto; 
            display: block;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        
        /* --- ESTILO DO PLAYER DE MÚSICA PERSONALIZADO --- */
        .player-bonitinho {
            background-color: #fff0f5; /* Um rosa bem clarinho */
            border: 1px solid #f8bbd0;
            border-radius: 16px;
            padding: 15px 20px;
            margin: 0 auto 30px auto;
            max-width: 100%;
            box-shadow: 0 4px 15px rgba(136, 14, 79, 0.08);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
        }

        .player-icone {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--cor-detalhe), var(--cor-texto-titulo));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .player-textos {
            display: flex;
            flex-direction: column;
        }

        .player-titulo {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--cor-texto-titulo);
        }

        .player-subtitulo {
            font-size: 0.85rem;
            color: #757575;
            font-style: italic;
        }

        .player-controles {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-play {
            background-color: var(--cor-detalhe);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            padding-left: 4px; /* Centraliza o ícone de play visualmente */
        }

        .btn-play.tocando {
            padding-left: 0; /* Centraliza o ícone de pause */
        }

        .btn-play:hover {
            transform: scale(1.1);
            background-color: var(--cor-texto-titulo);
        }

        .barra-progresso-fundo {
            flex-grow: 1;
            height: 6px;
            background-color: #fce4ec;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .barra-progresso-preenchida {
            height: 100%;
            width: 0%;
            background-color: var(--cor-detalhe);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .tempo-musica {
            font-size: 0.8rem;
            color: var(--cor-texto-corpo);
            font-family: monospace;
            min-width: 40px;
            text-align: right;
        }
        
        /* --- ESTILO DA CAIXA DE MENSAGEM --- */
        .caixa-mensagem {
            background-color: #fff0f5;
            border: 1px solid #f8bbd0;
            border-radius: 16px;
            padding: 20px;
            margin: 30px auto;
            max-width: 100%;
            box-shadow: 0 4px 15px rgba(136, 14, 79, 0.08);
            text-align: center;
        }

        .caixa-mensagem h3 {
            font-family: 'Playfair Display', serif;
            color: var(--cor-texto-titulo);
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.4rem;
        }

        .caixa-mensagem textarea {
            width: 100%;
            border: 1px solid #f48fb1;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Lora', serif;
            font-size: 1rem;
            color: var(--cor-texto-corpo);
            box-sizing: border-box;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 15px;
            background-color: #ffffff;
            outline: none;
            transition: border-color 0.3s;
        }

        .caixa-mensagem textarea:focus {
            border-color: var(--cor-detalhe);
        }

        .btn-enviar {
            background-color: var(--cor-detalhe);
            color: #ffffff;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1.05rem;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-enviar:hover {
            transform: scale(1.05);
            background-color: var(--cor-texto-titulo);
        }

        /* Ajustes para telas menores (Celulares) */
        @media (max-width: 480px) {
            .cartao-container {
                padding: 30px 20px;
                width: 95%;
                margin: 20px auto;
            }
            header h1 {
                font-size: 2.2rem;
            }
            .mensagem {
                font-size: 1.05rem;
            }
            model-viewer {
                height: 250px;
            }
        }
    </style>
</head>
<body>

    <div class="cartao-container">
        <header>

        </header>

        <main>

                <div class="player-controles">

                    <div class="barra-progresso-fundo" id="barraFundo">

 <script>
        const audio = document.getElementById('musicaLocal');
        const btnPlay = document.getElementById('btnPlay');
        const barraProgresso = document.getElementById('barraProgresso');
        const barraFundo = document.getElementById('barraFundo');
        const tempoMusica = document.getElementById('tempoMusica');

        // Alternar entre Play e Pause
        btnPlay.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                btnPlay.innerHTML = '⏸'; // Muda para ícone de pause
                btnPlay.classList.add('tocando');
            } else {
                audio.pause();
                btnPlay.innerHTML = '▶'; // Muda para ícone de play
                btnPlay.classList.remove('tocando');
            }
        });

        // Atualizar a barra de progresso e o tempo enquanto a música toca
        audio.addEventListener('timeupdate', () => {
            const progresso = (audio.currentTime / audio.duration) * 100;
            barraProgresso.style.width = `${progresso}%`;

            // Formatar o tempo (minutos:segundos)
            let minutos = Math.floor(audio.currentTime / 60);
            let segundos = Math.floor(audio.currentTime % 60);
            if (segundos < 10) segundos = `0${segundos}`;
            tempoMusica.textContent = `${minutos}:${segundos}`;
        });

        // Permitir clicar na barra para pular para uma parte da música
        barraFundo.addEventListener('click', (e) => {
            const larguraTotal = barraFundo.clientWidth;
            const cliqueX = e.offsetX;
            const novaPosicao = (cliqueX / larguraTotal) * audio.duration;
            audio.currentTime = novaPosicao;
        });
    </script>
</body>
</html>
