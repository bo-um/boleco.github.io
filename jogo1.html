<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>joguinho bo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cor-cartao: #ffffff;
            --cor-texto-titulo: #880e4f;
            --cor-texto-corpo: #424242;
            --cor-detalhe: #d81b60;
        }

        body {
            font-family: 'Lora', serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--cor-texto-corpo);
            position: relative; 
            
            /* --- FUNDO COM UMA IMAGEM SÓ --- */
            /* Coloque o nome correto da sua imagem aqui */
            background-image: url('nana.jpg'); 
            background-repeat: repeat; /* Faz o mosaico automático */
            background-attachment: fixed;
            background-size: 300px; /* Ajuste o tamanho da repetição aqui se precisar */
        }

        /* Camada escura por cima do mangá */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75); 
            z-index: 1; 
        }

        /* --- CARTÃO AUMENTADO PARA O JOGO --- */
        .cartao-container {
            position: relative; 
            z-index: 2;
            background-color: var(--cor-cartao);
            max-width: 900px; /* Cartão largo para o jogo caber bem */
            width: 95%; 
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); 
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            margin: 40px auto; 
            display: block;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--cor-texto-titulo);
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .iframe-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin: 0 auto 30px auto;
            background-color: #000;
        }

        /* Botão para voltar */
        .botao-voltar {
            display: inline-block;
            background-color: var(--cor-detalhe);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            transition: 0.3s;
            margin-top: 10px;
        }

        .botao-voltar:hover {
            background-color: var(--cor-texto-titulo);
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            .cartao-container {
                padding: 20px 15px;
            }
            header h1 {
                font-size: 2rem;
            }
            iframe {
                height: 400px;
            }
        }
    </style>
</head>
<body>

    <div class="cartao-container">
        <header>
            <h1>Gourdlets</h1>
        </header>

        <main>
            <div class="iframe-container">
                <!-- COLE O SEU LINK DO ITCH.IO NO src ABAIXO -->
                <iframe mozallowfullscreen="true" msallowfullscreen="true" frameborder="0" width="100%" height="600" allowfullscreen="true" scrolling="no" src="https://html-classic.itch.zone/html/7550065/itch/index.html?v=1732313654" id="game_drop" allow="autoplay; fullscreen *; geolocation; microphone; camera; midi; monetization; xr-spatial-tracking; gamepad; gyroscope; accelerometer; xr; cross-origin-isolated; web-share" allowtransparency="true" webkitallowfullscreen="true"></iframe>
            </div>

            <a href="index.html" class="botao-voltar">Voltar</a>
        </main>
    </div>

</body>
</html>
